project: "Pekeris Waveguide (Kraken)"
frequency: 250.0
environment:
  ssp:
    type: "c-linear"
    data:
      - {depth: 0.0, c: 1500.0}
      - {depth: 100.0, c: 1500.0}
  surface:
    type: "vacuum"
  bottom:
    type: "halfspace"
    depth: 100.0
    c_p: 1590.0
    density: 1.2
geometry:
  source:
    depths: [50.0]
  receivers:
    ranges: [0.0, 5000.0]
    depths: [0.0, 100.0]
solver:
  type: "normal_modes"
  phase_speed_limits: [0.0, 1590.0]
  n_mesh_points: 1000
  mesh_multiplier: [1]
